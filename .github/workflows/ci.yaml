name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  root-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: |
          set -euo pipefail
          mkdir -p ci-logs
          nix flake check 2>&1 | tee ci-logs/root-check.log
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/root-check.log
          if-no-files-found: ignore
          archive: false

  nixfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: |
          set -euo pipefail
          mkdir -p ci-logs
          find . -name '*.nix' -not -path '*/result/*' -not -path '*/node_modules/*' -print0 \
            | xargs -0 nix run nixpkgs#nixfmt -- --check 2>&1 | tee ci-logs/nixfmt.log
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/nixfmt.log
          if-no-files-found: ignore
          archive: false

  fixture-check:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          set -euo pipefail
          mkdir -p ci-logs
          nix flake check ./fixtures/tauri-app -L 2>&1 | tee "ci-logs/fixture-check-${{ matrix.os }}.log"
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/fixture-check-${{ matrix.os }}.log
          if-no-files-found: ignore
          archive: false

  integration:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: |
          set -euo pipefail
          mkdir -p "ci-logs/integration-${{ matrix.os }}"
          CI_LOG_DIR="$PWD/ci-logs/integration-${{ matrix.os }}" ./tests/integration.sh 2>&1 | tee "ci-logs/integration-${{ matrix.os }}.log"
      - if: ${{ always() }}
        run: |
          set -euo pipefail
          for log in build-initial.log build-source-change.log build-manifest-change.log; do
            if [ -f "ci-logs/integration-${{ matrix.os }}/$log" ]; then
              cp "ci-logs/integration-${{ matrix.os }}/$log" "ci-logs/integration-${log%.log}-${{ matrix.os }}.log"
            fi
          done
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/integration-${{ matrix.os }}.log
          if-no-files-found: ignore
          archive: false
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/integration-build-initial-${{ matrix.os }}.log
          if-no-files-found: ignore
          archive: false
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/integration-build-source-change-${{ matrix.os }}.log
          if-no-files-found: ignore
          archive: false
      - if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          path: ci-logs/integration-build-manifest-change-${{ matrix.os }}.log
          if-no-files-found: ignore
          archive: false
